services:
  - type: web
    name: haliberrycake-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install --upgrade pip &&
      pip install
      --only-binary=pydantic-core,psycopg2-binary,pillow,cryptography
      -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://haliberrycake.co.uk
      - key: PRODUCTION_URL
        value: https://haliberrycake.co.uk